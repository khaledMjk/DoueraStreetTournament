name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/football-tournament-interface-l774j3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Export static data from server/data
        run: node scripts/export-static.mjs
        working-directory: server

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build client (static demo build)
        run: npm run build
        working-directory: client
        env:
          VITE_BASE_PATH: /DoueraStreetTournament/
          VITE_STATIC_DATA: "true"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
